services:
  - type: web
    name: mimile-net-cafe
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_netcafe
    startCommand: gunicorn web_django.wsgi:application --log-file -
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_MEDIA_URL
        value: "/static/"
      - key: DJANGO_SECRET_KEY
        generateValue: true
