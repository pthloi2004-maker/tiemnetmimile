{% extends 'app/base.html' %}
{% block title %}Tạo QR Login (dev){% endblock %}
{% block content %}
<div class="container py-4">
  <div class="card">
    <div class="card-body">
      <h5 class="card-title">QR Token</h5>
      <p>Token: <code>{{ token }}</code></p>
      <p>URL: <a href="{{ url }}">{{ url }}</a></p>
      <p>Scan or open the URL to login (dev-mode).</p>
    </div>
  </div>
</div>
{% endblock %}
